---
layout: default
---
{%-include back_link.html-%}
<h1>{{ page.title }}</h1>

<div class="post-list">
  {% for post in page.posts %}
    <div class="post-item">
      <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
      <time>{{ post.date | date: "%Y.%m.%d" }}</time>
    </div>
  {% endfor %}
</div>
