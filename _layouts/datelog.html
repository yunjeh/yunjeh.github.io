---
layout: default
---

<!DOCTYPE html>

{%-include back_link.html-%}

<h1>{{ page.title }}</h1>

<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #map { width: 100%; height: 600px; background-color: #e0e0e0; }
        @media (max-width: 768px) { #map { height: 80vh; } }
        .leaflet-popup-close-button { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var map = L.map('map').setView([35.15, 128.60], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        fetch('/assets/places.json')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                data.forEach(function(item) {
                    var lat = parseFloat(item.lat);
                    var lng = parseFloat(item.lng);
                    
                    if(!isNaN(lat) && !isNaN(lng)) {
                        var dateStr = String(item.img).substring(0, 8);
                        var dateDisplay = dateStr.substring(0, 4) + "." + dateStr.substring(4, 6) + ".";
                        var title = item.place || item.address;

                        //var marker = L.marker([lat, lng]).addTo(map);
                        var marker = L.circleMarker([lat, lng], {
    radius: 5,              // 점의 크기 (숫자가 클수록 커집니다)
    fillColor: "#881111",   // 색 채우기
    color: "#ffffff",       // 점의 테두리 색 (흰색)
    weight: 1,              // 테두리 두께
    opacity: 1,             // 테두리 투명도
    fillOpacity: 0.8        // 채우기 투명도
}).addTo(map);
marker.bindPopup(
    '<div style="text-align:center; min-width:200px;">' +
    '<div style="font-weight:bold; font-size:12px; color:#666;">' + dateDisplay + '</div>' +
    '<img src="/_images/datelog/' + item.img + '" style="width:200px; height:200px; object-fit:contain; margin:10px 0; border-radius:4px; background:#f9f9f9;" onerror="this.style.display=\'none\'">' +
    '<div style="font-size:12px;">' + title + '</div>' +
    '</div>', 
    {
        autoPan: true,
        autoPanPadding: [20, 20],
        closeButton: false
    }
);
                    }
                });
            })
            .catch(function(err) { console.error("데이터 로드 에러:", err); });
    });
</script>
</body>
</html>
