---
layout: default
---
{%-include back_link.html-%}

<h1>{{ page.title }}</h1>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div id="map" style="width: 50%; height: 500px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"></div>

<script>
  
// 1. 지도 초기화
// [위도, 경도], 확대 수준(값이 클수록 확대됨)
const map = L.map('map').setView([36.1, 128.0], 6.1); 

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);    
    


  // 2. JSON 데이터 불러오기
  fetch('/assets/js/datelog_data.json')
    .then(response => {
      if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
      return response.json();
    })
    .then(data => {
      // 데이터 확인용 로그
      console.log("불러온 데이터:", data);
      
      data.forEach(spot => {
        if (!spot.coords || !spot.imgUrl) return;

        //const marker = L.marker(spot.coords).addTo(map);

        const marker = L.circleMarker(spot.coords, {
          radius: 3,
          fillColor: "#3333CC",
          color: "#3333CC",
          weight: 1,
          opacity: 1,
          fillOpacity: 0.8
        }).addTo(map);

        const tooltipContent = `
        <div style="text-align: center; font-family: sans-serif; padding: 5px;">
          <strong style="display: block; font-size: 12px;">${spot.name}</strong>
          <img src="${spot.imgUrl}" style="max-width: 150px; border-radius: 4px; display: block; margin: 5px auto;" />
          <div style="text-align: left; font-size: 12px;">
            <p style="margin: 2px 0;">📍 ${spot.address || '-'}</p>
            <p style="margin: 2px 0;">💬 ${spot.comment || ''}</p>
          </div>
        </div>
      `;
        
        marker.bindTooltip(tooltipContent, { direction: 'auto', sticky: true, opacity: 0.95 });
      });
    })
    .catch(err => {
      console.error("데이터 로드 실패:", err);
      alert("데이터를 불러올 수 없습니다.");
    });
</script>
