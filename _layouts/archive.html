---
layout: default
---

{%-include back_link.html-%}

<h1>{{ page.title }}</h1>
<h1>연도별 보기</h1>
<div class="year-grid">
  {% assign years = site.posts | map: 'date' | date: '%Y' | uniq %}
  {% for year in years %}
    <a href="/archive/{{ year }}/" class="year-button">
      {{ year }}년 ({{ site.posts | where_exp: "post", "post.date | date: '%Y' == year" | size }}개)
    </a>
  {% endfor %}
</div>
