---
layout: default
---

<!DOCTYPE html>

{%-include back_link.html-%}

<h1>{{ page.title }}</h1>
<style>
    .note-list {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }

    .note-item {
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid #eee;
    }

    .note-date {
        display: block;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.9rem;
        color: #888;
        margin-bottom: 8px;
    }

    .note-content {
        font-family: 'Gowun Dodum', sans-serif;
        font-size: 1.1rem;
        line-height: 1.6;
        color: #333;
    }
</style>

<div class="note-list">
    {% for post in site.notes %}
    <div class="note-item">
        <span class="note-date">{{ post.date | date: "%Y-%m-%d" }}</span>
        <div class="note-content">
            {{ post.content }}
        </div>
    </div>
    {% endfor %}
</div>
