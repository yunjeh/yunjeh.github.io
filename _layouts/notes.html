---
layout: default
---

<!DOCTYPE html>

{%-include back_link.html-%}

<h1>{{ page.title }}</h1>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Gamja+Flower&family=Nanum+Pen+Script&family=Noto+Serif+KR:wght@500&family=Sunflower:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        #wall {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 50px 50px 50px 22px; 
            box-sizing: border-box;
        }


.sticky-notes {
        position: absolute;
        width: 200px;
        min-height: 200px;
        padding: 16px;
        box-sizing: border-box;
        box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.08);
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transition: transform 0.25s ease;
    }

        .sticky-notes:hover {
            transform: scale(1.12) rotate(0deg) !important;
            z-index: 99999 !important;
            box-shadow: 0px 15px 30px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .sticky-notes .content-body {
            font-weight: 400; /* 🎯 굵기를 두껍게(Bold) 하려면 700 */
            color: #2c3e50;
            text-align: center;
            margin: 0;
            width: 100%;
            word-break: keep-all;     
            word-wrap: break-word;    
            display: -webkit-box;
            -webkit-line-clamp: 6; 
            -webkit-box-orient: vertical;
        }

        .sticky-notes .date {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.35);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="wall">
    {% for post in site.notes %}
    <div class="sticky-notes">
        <div class="content-body">{{ post.content | strip_html | trim }}</div>
        <div class="date">{{ post.date | date: "%Y-%m-%d" }}</div>
    </div>
    {% endfor %}
</div>

    <script>
    const wall = document.getElementById('wall');

    function layoutStickyNotes() {
        // 클래스명을 sticky-notes로 변경
        let stickyNotes = Array.from(document.querySelectorAll('.sticky-notes'));
        
        const padding = 20;
        const cardWidth = 220;
        const wallWidth = wall.clientWidth;
        
        // 열 개수 계산
        const cols = Math.floor(wallWidth / (cardWidth + padding)) || 1;
        let colHeights = new Array(cols).fill(50);

        stickyNotes.forEach((item) => {
            // 가장 낮은 높이를 가진 열을 찾아 배치 (겹침 방지)
            let minHeight = Math.min(...colHeights);
            let col = colHeights.indexOf(minHeight);

            let left = padding + col * (cardWidth + padding);
            let top = minHeight;

            item.style.position = 'absolute';
            item.style.left = left + 'px';
            item.style.top = top + 'px';
            
            // 높이 갱신
            colHeights[col] += item.clientHeight + padding;
        });

        wall.style.height = Math.max(...colHeights) + 50 + 'px';
    }

    window.addEventListener('DOMContentLoaded', layoutStickyNotes);
    window.addEventListener('resize', layoutStickyNotes);
</script>
</body>
</html>
