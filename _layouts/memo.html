---
layout: default
---

<!DOCTYPE html>

{%-include back_link.html-%}

<h1>{{ page.title }}</h1>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-it Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Gamja+Flower&family=Nanum+Pen+Script&family=Noto+Serif+KR:wght@500&family=Sunflower:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f5f5f3;
            background-image: radial-gradient(#dbdbd7 1.2px, transparent 0);
            background-size: 28px 28px;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* 🎯 [수정] 40% 여백을 제거하고, 기존보다 대폭 줄어든 120px 고정 여백을 적용합니다. */
        #wall {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 50px 50px 50px 24px; 
            box-sizing: border-box;
        }

        .post-it {
            position: absolute;
            width: 240px;
            height: 240px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.08), 
                        0px 8px 16px rgba(0, 0, 0, 0.04);
            pointer-events: auto;
            cursor: default;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.25s ease, z-index 0.1s step-end;
        }

        .post-it:hover {
            transform: scale(1.12) rotate(0deg) !important;
            z-index: 99999 !important;
            box-shadow: 0px 15px 30px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .post-it .content-body {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.6;
            color: #2c3e50;
            text-align: center;
            margin: 0;
            width: 100%;
            word-break: keep-all;     
            word-wrap: break-word;    
            display: -webkit-box;
            -webkit-line-clamp: 6; 
            -webkit-box-orient: vertical;
        }

        .post-it .date {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.35);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="wall">
    {% for post in site.post2 %}
    <div class="post-it">
        <div class="content-body">{{ post.content | strip_html | trim }}</div>
        <div class="date">{{ post.date | date: "%Y-%m-%d" }}</div>
    </div>
    {% endfor %}
</div>

<script>
    const colors = ['#fff9ae', '#ffdfd3', '#f0ffdf', '#d6f5ff', '#fce1ff'];

    const fonts = [
        "'Gaegu', sans-serif",
        "'Gamja Flower', sans-serif",
        "'Gowun Dodum', sans-serif",
        "'Noto Serif KR', serif",
        "'Sunflower', sans-serif"
    ];

    const wall = document.getElementById('wall');

    function layoutPostIts() {
        let postIts = Array.from(document.querySelectorAll('.post-it'));
        
        // 피셔-예이츠 셔플로 무작위 섞기 유지
        for (let i = postIts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [postIts[i], postIts[j]] = [postIts[j], postIts[i]];
        }

        // 줄어든 패딩에 맞춰 가로 가용 너비 자동 계산
        const paddingLeft = parseFloat(window.getComputedStyle(wall).paddingLeft);
        const wallWidth = wall.clientWidth - paddingLeft - 50;
        const cardSize = 240; 
        const stride = cardSize + 25; 

        const cols = Math.floor(wallWidth / stride) || 1;
        const rows = Math.ceil(postIts.length / cols);

        wall.style.height = `${rows * stride + 100}px`;

        postIts.forEach((item, index) => {
            const col = index % cols;
            const row = Math.floor(index / cols);

            // 🎯 줄어든 120px 여백을 기준선으로 삼아 첫 열부터 촘촘히 배치됩니다.
            const baseLeft = paddingLeft + col * stride;
            const baseTop = 50 + row * stride;

            const offsetX = (Math.random() - 0.5) * 40;
            const offsetY = (Math.random() - 0.5) * 40;
            const rotate = (Math.random() - 0.5) * 14;

            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const randomFont = fonts[Math.floor(Math.random() * fonts.length)];

            const contentEl = item.querySelector('.content-body');
            if (contentEl) {
                let text = contentEl.innerHTML;
                if (!text.includes('<br>')) {
                    text = text.replace(/"([^"]*)"/g, '"$1"<br>'); 
                    contentEl.innerHTML = text.replace(/(<br>)+$/g, '');
                }
                contentEl.style.fontFamily = randomFont;
            }

            item.style.left = `${baseLeft + offsetX}px`;
            item.style.top = `${baseTop + offsetY}px`;
            item.style.transform = `rotate(${rotate}deg)`;
            item.style.backgroundColor = randomColor;
            item.style.zIndex = index + 1;
        });
    }

    window.addEventListener('DOMContentLoaded', layoutPostIts);
    window.addEventListener('resize', layoutPostIts);
</script>

</body>
</html>
