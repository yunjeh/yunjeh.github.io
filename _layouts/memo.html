{%-include back_link.html-%}

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-it Wall</title>
    <style>
        body {
            background-color: #f5f5f3;
            background-image: radial-gradient(#dbdbd7 1.2px, transparent 0);
            background-size: 28px 28px;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        #wall {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 50px;
            box-sizing: border-box;
        }

        /* 포스트잇 컴포넌트 */
        .post-it {
            position: absolute;
            width: 160px;
            height: 160px;
            padding: 16px;
            box-sizing: border-box;
            
            /* 테두리가 자연스럽게 겹치는 느낌을 주는 그림자 */
            box-shadow: 1px 2px 4px rgba(0, 0, 0, 0.1), 
                        0px 6px 12px rgba(0, 0, 0, 0.05);
            
            /* 🚫 절대 클릭되거나 열리지 않도록 차단 */
            pointer-events: auto;
            cursor: default;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* 마우스를 올리면 완전히 드러나며 위로 점프 */
        .post-it:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 9999 !important;
            box-shadow: 0px 12px 20px rgba(0, 0, 0, 0.2);
        }

        .post-it h3 {
            font-family: 'Segoe UI', Roboto, sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            color: #2c3e50;
            margin: 0;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
        }

        .post-it .date {
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(0, 0, 0, 0.35);
            text-align: right;
        }
    </style>
</head>
<body>

<div id="wall">
    {% for post in site.post2 %}
    <div class="post-it">
        <h3>{{ post.title }}</h3>
        <div class="date">{{ post.date | date: "%y.%m.%d" }}</div>
    </div>
    {% endfor %}
</div>

<script>
    const colors = [
        '#fff9ae', // 노랑
        '#ffdfd3', // 살구
        '#f0ffdf', // 연그린
        '#d6f5ff', // 연하늘
        '#fce1ff'  // 연보라
    ];

    const postIts = document.querySelectorAll('.post-it');
    const wall = document.getElementById('wall');

    function layoutPostIts() {
        const wallWidth = wall.clientWidth - 100; // 패딩 공간 제외
        const cardSize = 160;  // 포스트잇 가로세로 크기
        
        // 💡 핵심: 배치 간격을 카드 크기보다 살짝 넓게 세팅 (185px)
        // 이렇게 하면 기본적으로 글자가 있는 몸통은 서로 닿지 않습니다.
        const stride = cardSize + 25; 

        const cols = Math.floor(wallWidth / stride) || 1;
        const rows = Math.ceil(postIts.length / cols);

        wall.style.height = `${rows * stride + 100}px`;

        postIts.forEach((item, index) => {
            const col = index % cols;
            const row = Math.floor(index / cols);

            // 표준 고정 위치 계산
            const baseLeft = 50 + col * stride;
            const baseTop = 50 + row * stride;

            // 🎲 랜덤 '기울기'와 '미세 이동'을 조합해 모서리 끝부분만 닿게 조절
            // 가로세로 최대 18px 범위 안에서만 흔들리므로 글씨가 덮이지 않습니다.
            const offsetX = (Math.random() - 0.5) * 36;
            const offsetY = (Math.random() - 0.5) * 36;
            const rotate = (Math.random() - 0.5) * 16; // -8도 ~ +8도 회전

            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            item.style.left = `${baseLeft + offsetX}px`;
            item.style.top = `${baseTop + offsetY}px`;
            item.style.transform = `rotate(${rotate}degpx)`;
            item.style.transform = `rotate(${rotate}deg)`;
            item.style.backgroundColor = randomColor;
            item.style.zIndex = index + 1;
        });
    }

    window.addEventListener('DOMContentLoaded', layoutPostIts);
    window.addEventListener('resize', layoutPostIts);
</script>

</body>
</html>
