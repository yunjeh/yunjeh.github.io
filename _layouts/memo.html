---
layout: default
---

<!DOCTYPE html>

{%-include back_link.html-%}
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-it Wall</title>
    <style>
        body {
            background-color: #f5f5f3;
            background-image: radial-gradient(#dbdbd7 1.2px, transparent 0);
            background-size: 28px 28px;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        #wall {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 50px;
            box-sizing: border-box;
        }

        /* 포스트잇 디자인 컴포넌트 */
        .post-it {
            position: absolute;
            width: 160px;
            height: 160px;
            padding: 16px;
            box-sizing: border-box;
            
            box-shadow: 1px 2px 4px rgba(0, 0, 0, 0.1), 
                        0px 6px 12px rgba(0, 0, 0, 0.05);
            
            /* 클릭 차단 */
            pointer-events: auto;
            cursor: default;
            
            /* 🎯 정중앙 정렬을 위한 설정 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 세로 중앙 */
            align-items: center;     /* 가로 중앙 */
            overflow: hidden;
            
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .post-it:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 9999 !important;
            box-shadow: 0px 12px 20px rgba(0, 0, 0, 0.2);
        }

        /* 🎯 본문 텍스트 스타일 지정 */
        .post-it .content-body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.5;
            color: #2c3e50;
            text-align: center; /* 글자 자체도 가운데 정렬 */
            margin: 0;
            word-break: keep-all;     /* 한글/영문 모두 단어 중간이 끊기지 않게 보호 */
            word-wrap: break-word;    /* 단어가 포스트잇 폭보다 길 때만 예외적으로 줄바꿈 */
            
            /* 글이 포스트잇 밖으로 넘치면 말줄임표(...) 처리 */
            display: -webkit-box;
            -webkit-line-clamp: 5; 
            -webkit-box-orient: vertical;
        }

        /* 날짜는 오른쪽 아래에 작고 연하게 배치 */
        .post-it .date {
            position: absolute;
            bottom: 10px;
            right: 12px;
            font-family: monospace;
            font-size: 0.7rem;
            color: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

<div id="wall">
    {% for post in site.post2 %}
    <div class="post-it">
        <!-- 🎯 제목 대신 본문 내용(strip_html로 마크다운/HTML 태그 제거)을 넣습니다 -->
        <div class="content-body">{{ post.content | strip_html | trim }}</div>
        <div class="date">{{ post.date | date: "%y.%m.%d" }}</div>
    </div>
    {% endfor %}
</div>

<script>
    const colors = [
        '#fff9ae', // 노랑
        '#ffdfd3', // 살구
        '#f0ffdf', // 연그린
        '#d6f5ff', // 연하늘
        '#fce1ff'  // 연보라
    ];

    const postIts = document.querySelectorAll('.post-it');
    const wall = document.getElementById('wall');

    function layoutPostIts() {
        const wallWidth = wall.clientWidth - 100;
        const cardSize = 160; 
        const stride = cardSize + 25; 

        const cols = Math.floor(wallWidth / stride) || 1;
        const rows = Math.ceil(postIts.length / cols);

        wall.style.height = `${rows * stride + 100}px`;

        postIts.forEach((item, index) => {
            const col = index % cols;
            const row = Math.floor(index / cols);

            const baseLeft = 50 + col * stride;
            const baseTop = 50 + row * stride;

            const offsetX = (Math.random() - 0.5) * 36;
            const offsetY = (Math.random() - 0.5) * 36;
            const rotate = (Math.random() - 0.5) * 16;

            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            item.style.left = `${baseLeft + offsetX}px`;
            item.style.top = `${baseTop + offsetY}px`;
            item.style.transform = `rotate(${rotate}deg)`;
            item.style.backgroundColor = randomColor;
            item.style.zIndex = index + 1;
        });
    }

    window.addEventListener('DOMContentLoaded', layoutPostIts);
    window.addEventListener('resize', layoutPostIts);
</script>

</body>
</html>
