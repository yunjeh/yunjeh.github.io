---
layout: default
---

{%-include back_link.html-%}

<h1>{{ page.title }}</h1>


<!-- 1. Leaflet 라이브러리 CSS/JS 로드 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 2. 지도가 표시될 디브 영역 -->
<div id="map" style="width: 100%; height: 500px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"></div>

<script>
  // 3. 지도 초기화 (전 세계가 한눈에 보이도록 중심 좌표와 줌 레벨 설정)
  const map = L.map('map').setView([20, 0], 2);

  // 4. 심플한 지도 타일 레이어 추가 (OpenStreetMap 사용)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // 5. 내가 다녀온 여행지 데이터 배열
  const travelSpots = [
    {
      name: "2025-01-22",
      coords: [47.443645, -122.303303],
      imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/20250122_114224.jpeg"
    },
    {
      name: "2025-01-24",
      coords: [64.142714, -21.927713],
      imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/20250124_225115.jpeg"
    },
    {
      name: "2025-01-25",
      coords: [64.312555, -20.300197],
      imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/20250125_142437.jpeg"
    },
    {
      name: "2025-01-28",
      coords: [55.686658, 12.599238],
      imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/20250128_105557.jpeg"
    },
    {
      name: "2025-02-03",
      coords: [60.171862, 24.951962],
      imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/20250203_085827.jpeg"
    },
    {
      name: "2026-01-31",
      coords: [37.947270, 27.371945],
      imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/20260131_140735.jpeg"
    },
    {
      name: "2026-02-01",
      coords: [41.019206, 28.970645],
      imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/220260201_091910.jpeg"
    },
    {
      //name: "2025-01-28",
      //coords: [55.686658, 12.599238],
      //imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/20250128_105557.jpeg"
    },
    {
      //name: "2025-01-28",
      //coords: [55.686658, 12.599238],
      //imgUrl: "https://raw.githubusercontent.com/yunjeh/yunjeh.github.io/master/_images/travel/20250128_105557.jpeg"
    }
  ];

  // 6. 데이터 배열을 돌며 지도에 마커 및 마우스 오버(Hover) 툴팁 바인딩
  travelSpots.forEach(spot => {
    // 안전장치: 좌표나 이미지 주소가 없는 데이터는 건너뜁니다.
    if (!spot.coords || !spot.imgUrl) return;

    // 기본 마커 생성
    const marker = L.marker(spot.coords).addTo(map);

    // 마우스 오버 시 나타날 HTML 템플릿 정의 (장축 240px 제한 적용)
    const tooltipContent = `
      <div style="text-align: center; font-family: sans-serif; padding: 4px;">
        <strong style="display: block; margin-bottom: 6px; font-size: 13px;">${spot.name}</strong>
        <img src="${spot.imgUrl}" alt="${spot.name}" 
             style="max-width: 240px; max-height: 240px; width: auto; height: auto; border-radius: 4px; display: block; margin: 0 auto;" />
      </div>
    `;

    // 툴팁 바인딩 (sticky: true 옵션으로 마우스 커서를 따라다니게 설정)
    marker.bindTooltip(tooltipContent, {
      direction: 'auto',
      sticky: true,
      opacity: 0.95
    });
  });
</script>
