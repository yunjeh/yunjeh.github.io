  // 6. 데이터 배열을 돌며 지도에 마커 및 마우스 오버(Hover) 툴팁 바인딩
  travelSpots.forEach(spot => {
    // 안전장치: 좌표나 이미지 주소가 없는 데이터는 건너뜁니다.
    if (!spot.coords || !spot.imgUrl) return;

    // 기본 마커 생성
    const marker = L.marker(spot.coords).addTo(map);

    // 마우스 오버 시 나타날 HTML 템플릿 정의 (장축 240px 제한 적용)
    const tooltipContent = `
      <div style="text-align: center; font-family: sans-serif; padding: 4px;">
        <strong style="display: block; margin-bottom: 6px; font-size: 13px;">${spot.name}</strong>
        <img src="${spot.imgUrl}" alt="${spot.name}" 
             style="max-width: 240px; max-height: 240px; width: auto; height: auto; border-radius: 4px; display: block; margin: 0 auto;" />
      </div>
    `;

    // 툴팁 바인딩 (sticky: true 옵션으로 마우스 커서를 따라다니게 설정)
    marker.bindTooltip(tooltipContent, {
      direction: 'auto',
      sticky: true,
      opacity: 0.95
    });
  });
