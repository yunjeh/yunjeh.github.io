title: "라이프로그" # name of the site
author: jyun # name of site's author
email:  # email of site's author
url:  # root address of the site
baseurl: "/" #"/no-style-please" # subpath of the site, e.g. "/blog" (leave it blank "" if you're site shouldn't use a subpath)
description: > # description of the site (multiple lines allowed)
  아 집이 최고다
future: true

permalink: /:slug.html

favicon: #"logo.png" # name+extension of favicon (which must be put on the root folder)
# goat_counter: "yoursitename" # put your GoatCounter name if you want to use GoatCounter analytics

remote_theme: #riggraz/no-style-please # if you are using GitHub Pages, change it to remote_theme: riggraz/no-style-please

theme_config:
  appearance: "light" # can be "light", "dark" or "auto"
  back_home_text: ".." # customize text for homepage link in post layout
  date_format: "%Y.%m.%d." # customize how date is formatted
  show_description: false # show blog description in home page
  lowercase_titles: true # show titles in lowercase in lists

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jektex
  - jekyll-archives

jekyll-archives:
  enabled:
    - year
  layout: 'archive_year.html' # 각 연도 페이지에 적용할 레이아웃
  permalinks:
    year: '/archive/:year/'

jektex:
  cache_dir: ".jektex-cache"
  ignore: ["*.xml"]
  silent: false
  macros:
    - ["\\Q", "\\mathbb{Q}"]
    - ["\\C", "\\mathbb{C}"]
include:
  - _images
  - _overall
collections:
  notes:
    output: true
    permalink: /notes/:path/
